services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: partition_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourPassword123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
      - ./sql:/sql                  # mount thư mục chứa scripts
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "YourPassword123!" -Q "SELECT 1" -No
      interval: 10s
      retries: 10
      start_period: 30s

  sql-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: partition_init
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./sql:/sql
    command: >
      bash -c "
        echo 'Chạy script 1: Horizontal Partitioning...' &&
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'YourPassword123!' -i /sql/1_horizontal_partitioning.sql -No &&
        echo 'Chạy script 2: Vertical Partitioning...' &&
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'YourPassword123!' -i /sql/2_vertical_partitioning.sql -No &&
        echo 'Chạy script 3: Functional Partitioning...' &&
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P 'YourPassword123!' -i /sql/3_functional_partitioning.sql -No &&
        echo '=== Tất cả scripts đã chạy xong! ==='
      "

  app:
    build: ./app
    container_name: partition_app
    depends_on:
      sql-init:
        condition: service_completed_successfully
    ports:
      - "3000:3000"
    environment:
      DB_SERVER: sqlserver
      DB_USER: sa
      DB_PASSWORD: "YourPassword123!"
      DB_NAME: PartitionDemo

volumes:
  sqldata:
